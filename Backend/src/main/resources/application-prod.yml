spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SHUTTLEPLAY_WITH_TRIGGER_DB_USERNAME}
    password: ${SHUTTLEPLAY_WITH_TRIGGER_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

  mail:
    host: smtp.zoho.com
    port: 587
    username: ${SHUTTLEPLAY_WITH_TRIGGER_ZOHO_EMAIL_USERNAME}
    password: ${SHUTTLEPLAY_WITH_TRIGGER_ZOHO_EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    from: ${SHUTTLEPLAY_WITH_TRIGGER_ZOHO_EMAIL_USERNAME}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${SHUTTLEPLAY_WITH_TRIGGER_GOOGLE_CLIENT_ID}
            client-secret: ${SHUTTLEPLAY_WITH_TRIGGER_GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - email
              - profile
          kakao:
            client-id: ${SHUTTLEPLAY_WITH_TRIGGER_KAKAO_CLIENT_ID}
            client-secret: ${SHUTTLEPLAY_WITH_TRIGGER_KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - account_email
              - profile_image
            client-name: Kakao
          naver:
            client-id: ${SHUTTLEPLAY_WITH_TRIGGER_NAVER_CLIENT_ID}
            client-secret: ${SHUTTLEPLAY_WITH_TRIGGER_NAVER_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - email
              - profile_image
              - name
              - gender
              - age
            client-name: Naver
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

jwt:
  secret: ${SHUTTLEPLAY_WITH_TRIGGER_JWT_SECRET}
  access-token-expiration-millis: 3600000
  refresh-token-expiration-millis: 1209600000

app:
  allowed-origins: https://www.shuttleplay.kr
  password-reset-url: https://www.shuttleplay.kr/password-reset/confirm
  oauth2-redirect-url: https://www.shuttleplay.kr/oauth/
  oauth2-profile-completion-redirect-url: https://www.shuttleplay.kr/social-signup
  oauth2-main-redirect-url: https://www.shuttleplay.kr/
  auth-cookie-secure: true

web-push:
  subject: ${SHUTTLEPLAY_WITH_TRIGGER_WEB_PUSH_SUBJECT}
  public-key: ${SHUTTLEPLAY_WITH_TRIGGER_WEB_PUSH_PUBLIC_KEY}
  private-key: ${SHUTTLEPLAY_WITH_TRIGGER_WEB_PUSH_PRIVATE_KEY}
